              <div style={{ fontFamily:"'Baloo 2',cursive",fontSize:18,fontWeight:700,marginBottom:4,color:"#1a5276" }}>📥 Import from Google Sheets</div>
              <div style={{ fontSize:13,color:"#8a94a6",marginBottom:16 }}>Export your Google Sheet as an <strong>.xlsx</strong> file (File → Download → Excel) and upload it here. Each student tab will be imported automatically.</div>
              <label style={{ display:"inline-block",padding:"10px 20px",background:"#3498db",color:"#fff",borderRadius:12,fontFamily:"inherit",fontSize:14,fontWeight:800,cursor:"pointer",marginBottom:16 }}>
                📂 Choose .xlsx File
                <input type="file" accept=".xlsx,.xls" style={{ display:"none" }} onChange={handleImportFile} />
              </label>
              {importPreview && (
                <>
                  <div style={{ fontWeight:800,fontSize:14,marginBottom:10,color:"#1e2a3a" }}>Preview — {importPreview.length} students found:</div>
                  <div style={{ maxHeight:220,overflowY:"auto",marginBottom:16,border:"1px solid #e4e9f0",borderRadius:12 }}>
                    {importPreview.map((s,i) => (
                      <div key={i} style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderBottom:"1px solid #f0f4f8" }}>
                        <div>
                          <div style={{ fontWeight:700,fontSize:14 }}>{s.name}</div>
                          <div style={{ fontSize:12,color:"#8a94a6" }}>{s.txCount} transactions · PIN will be 1234</div>
                        </div>
                        <div style={{ fontFamily:"'Baloo 2',cursive",fontSize:18,fontWeight:800,color:"#27ae60" }}>${s.balance.toFixed(2)}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ display:"flex",gap:10 }}>
                    <Btn onClick={()=>{setImportPreview(null);setImportFile(null);}} color="#f0f4f8" textColor="#1e2a3a" style={{flex:1}}>Cancel</Btn>
                    <Btn onClick={confirmImport} color="#3498db" style={{flex:1}}>✅ Confirm Import</Btn>
                  </div>
                </>
              )}
            </Card>

            <Card>
              <div style={{ fontFamily:"'Baloo 2',cursive",fontSize:18,fontWeight:700,marginBottom:14 }}>➕ Add New Student</div>
              <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:14 }}>
                <Input label="Full Name" placeholder="Student Name" value={newName} onChange={e=>setNewName(e.target.value)} />
                <Input label="Student ID" placeholder="e.g. S004" value={newId} onChange={e=>setNewId(e.target.value)} />
                <Input label="PIN" placeholder="4-digit PIN" maxLength={6} value={newPin} onChange={e=>setNewPin(e.target.value)} />
                <Input label="Starting Balance ($)" type="number" min="0" step="0.01" placeholder="0.00" value={newBal} onChange={e=>setNewBal(e.target.value)} />
              </div>
              <Btn onClick={addStudent}>➕ Add Student</Btn>
            </Card>
            <Card>
              <div style={{ fontFamily:"'Baloo 2',cursive",fontSize:18,fontWeight:700,marginBottom:8 }}>🗂️ Archive / Restore Students</div>
              <div style={{ fontSize:13,color:"#8a94a6",marginBottom:16 }}>Archived students can't log in but their records are kept.</div>
              {db.students.map(s=>(
                <div key={s.id} style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 0",borderBottom:"1px solid #f0f4f8" }}>
                  <div>
                    <span style={{ fontWeight:700 }}>{s.name}</span>
                    <span style={{ color:"#8a94a6",fontSize:12,marginLeft:8 }}>ID: {s.id}</span>
                    {s.archived&&<span style={{ background:"#fadbd8",color:"#e74c3c",fontSize:10,fontWeight:800,padding:"2px 8px",borderRadius:20,marginLeft:6 }}>Archived</span>}
                  </div>
                  <div style={{ display:"flex", gap:8 }}>
                    <Btn onClick={()=>toggleArchive(s.id)} color={s.archived?"#2ecc71":"#e74c3c"} style={{ padding:"8px 14px",fontSize:12 }}>{s.archived?"♻️ Restore":"🗂️ Archive"}</Btn>
                    <Btn onClick={()=>deleteStudent(s.id)} color="#c0392b" style={{ padding:"8px 14px",fontSize:12 }}>🗑️ Delete</Btn>
                  </div>
                </div>
              ))}
            </Card>
            <Card>
              <div style={{ fontFamily:"'Baloo 2',cursive",fontSize:18,fontWeight:700,marginBottom:14 }}>🔒 Change Teacher Password</div>
              <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:14 }}>
                <Input label="Current Password" type="password" placeholder="Current password" value={curPw} onChange={e=>setCurPw(e.target.value)} />
                <Input label="New Password" type="password" placeholder="New password" value={newPw} onChange={e=>setNewPw(e.target.value)} />
              </div>
              <Btn onClick={changeTeacherPw} color="#3498db">🔒 Update Password</Btn>
            </Card>
            <Card>
              <div style={{ fontFamily:"'Baloo 2',cursive",fontSize:18,fontWeight:700,color:"#e74c3c",marginBottom:8 }}>⚠️ Danger Zone</div>
              <div style={{ fontSize:13,color:"#8a94a6",marginBottom:16 }}>These actions cannot be undone.</div>
              <div style={{ display:"flex",gap:10,flexWrap:"wrap" }}>
                <Btn color="#e74c3c" onClick={()=>setConfirm({title:"Clear All History?",msg:"Deletes all transactions. Balances are NOT affected.",cb:async()=>{await persist({...db,transactions:[]});showSnack("History cleared.","success");}})}>🗑️ Clear History</Btn>
                <Btn color="#c0392b" onClick={()=>setConfirm({title:"Full Reset?",msg:"Deletes ALL students, transactions and store data!",cb:async()=>{await persist({...DEFAULT_DATA});showSnack("System reset.","success");}})}>💥 Full Reset</Btn>
              </div>
            </Card>
          </>
        )}
      </div>

      {/* ── ADD/EDIT ITEM MODAL ── */}
      <Modal open={emojiPickerOpen} onClose={() => setEmojiPickerOpen(false)} title={editingItem ? "✏️ Edit Item" : "➕ Add Store Item"} subtitle="Fill in the details for this store item." wide>

        {/* Image / Emoji preview + controls */}
        <div style={{ marginBottom:18 }}>
          <div style={{ fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.07em",color:"#8a94a6",marginBottom:10 }}>Item Image</div>

          {/* Preview */}
          <div style={{ display:"flex",alignItems:"center",gap:14,marginBottom:14 }}>
            <div style={{ width:80,height:80,borderRadius:16,border:"2px solid #e4e9f0",overflow:"hidden",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:"#f8fafc" }}>
              {itemImage
                ? <img src={itemImage} alt="item" style={{ width:"100%",height:"100%",objectFit:"cover" }} />
                : <span style={{ fontSize:42 }}>{itemEmoji}</span>
              }
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:13,color:"#8a94a6",fontWeight:600,marginBottom:10 }}>Upload a photo or pick an emoji below. Photos look great in the store!</div>
              <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
                <label style={{ padding:"8px 14px",background:"#3498db",color:"#fff",borderRadius:10,fontFamily:"inherit",fontSize:13,fontWeight:800,cursor:"pointer",display:"inline-block" }}>
                  📷 Upload Photo
                  <input type="file" accept="image/*" style={{ display:"none" }} onChange={e=>{
                    const file=e.target.files[0]; if(!file) return;
                    if(file.size>2*1024*1024){showSnack("Image too large. Max 2MB.","error");return;}
                    const reader=new FileReader();
                    reader.onload=ev=>setItemImage(ev.target.result);
                    reader.readAsDataURL(file);
                  }} />
                </label>
                {itemImage && (
                  <button onClick={()=>setItemImage("")} style={{ padding:"8px 14px",background:"#fadbd8",color:"#e74c3c",border:"none",borderRadius:10,fontFamily:"inherit",fontSize:13,fontWeight:800,cursor:"pointer" }}>✕ Remove Photo</button>
                )}
              </div>
            </div>
          </div>

          {/* Emoji picker (shown when no photo) */}
          {!itemImage && (
            <>
              <div style={{ fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.07em",color:"#8a94a6",marginBottom:8 }}>Or Choose an Emoji</div>
              <div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>
                {ITEM_EMOJIS.map(e=>(
                  <button key={e} onClick={()=>setItemEmoji(e)} style={{ width:36,height:36,fontSize:20,background:itemEmoji===e?"#d5f5e3":"#f0f4f8",border:itemEmoji===e?"2px solid #27ae60":"2px solid transparent",borderRadius:8,cursor:"pointer" }}>{e}</button>
                ))}
              </div>
            </>
          )}
        </div>

        <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:14 }}>
          <Input label="Item Name" placeholder="e.g. Pencil Pack" value={itemName} onChange={e=>setItemName(e.target.value)} />
          <Input label="Price ($)" type="number" min="0.01" step="0.01" placeholder="0.00" value={itemPrice} onChange={e=>setItemPrice(e.target.value)} />
        </div>
        <Select label="Category" value={itemCat} onChange={e=>setItemCat(e.target.value)}>
          <option value="Physical">📦 Physical Item</option>
          <option value="Privilege">⭐ Privilege</option>
        </Select>
        <Input label="Description" placeholder="Short description..." value={itemDesc} onChange={e=>setItemDesc(e.target.value)} />
        <label style={{ display:"flex",alignItems:"center",gap:8,fontWeight:700,fontSize:14,marginBottom:14,cursor:"pointer" }}>
          <input type="checkbox" checked={itemUnlimited} onChange={e=>setItemUnlimited(e.target.checked)} /> Unlimited stock (for privileges)
        </label>
        {!itemUnlimited && <Input label="Stock Quantity" type="number" min="0" placeholder="e.g. 20" value={itemStock} onChange={e=>setItemStock(e.target.value)} />}
        <div style={{ display:"flex",gap:10,marginTop:4 }}>
          <Btn onClick={()=>setEmojiPickerOpen(false)} color="#f0f4f8" textColor="#1e2a3a" style={{ flex:1 }}>Cancel</Btn>
          <Btn onClick={saveItem} style={{ flex:1 }}>{editingItem?"Save Changes":"Add to Store"}</Btn>
        </div>
      </Modal>

      {/* Student Detail Modal */}
      {detailStudent && (
        <Modal open={!!detailSid} onClose={()=>setDetailSid(null)} title={`${detailStudent.emoji} ${detailStudent.name}`} subtitle={`ID: ${detailStudent.id}`}>
          <div style={{ fontFamily:"'Baloo 2',cursive",fontSize:34,fontWeight:800,color:"#27ae60",marginBottom:4 }}>{fmt(detailStudent.balance)}</div>
          <div style={{ fontSize:13,color:"#8a94a6",marginBottom:20 }}>Current Balance</div>
          <Input label="Reset Student PIN" placeholder="New PIN" value={detailPin} onChange={e=>setDetailPin(e.target.value)} />
          <div style={{ display:"flex",gap:10 }}>
            <Btn onClick={()=>setDetailSid(null)} color="#f0f4f8" textColor="#1e2a3a" style={{ flex:1 }}>Close</Btn>
            <Btn onClick={savePin} style={{ flex:1 }}>Save PIN</Btn>
          </div>
        </Modal>
      )}

      {/* Confirm Modal */}
      {confirm && (
        <Modal open={!!confirm} onClose={()=>setConfirm(null)} title={confirm.title} subtitle={confirm.msg}>
          <div style={{ display:"flex",gap:10,marginTop:8 }}>
            <Btn onClick={()=>setConfirm(null)} color="#f0f4f8" textColor="#1e2a3a" style={{ flex:1 }}>Cancel</Btn>
            <Btn onClick={async()=>{await confirm.cb();setConfirm(null);}} color="#e74c3c" style={{ flex:1 }}>Confirm</Btn>
          </div>
        </Modal>
      )}

      {/* Past Tally Modal */}
      <Modal open={tallyPastOpen} onClose={()=>setTallyPastOpen(false)} title="📅 Add Past Tallies" subtitle="Record tallies for a previous date." wide>
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:11, fontWeight:800, textTransform:"uppercase", letterSpacing:"0.07em", color:"#8a94a6", marginBottom:8 }}>Select Class</div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {tallyClasses.map(c => (
              <button key={c.id} onClick={()=>setTallyPastClass(c.id)}
                style={{ padding:"9px 16px", background: tallyPastClass===c.id ? c.color : "#f0f4f8", color: tallyPastClass===c.id ? "#fff" : "#8a94a6", border:"none", borderRadius:10, fontFamily:"inherit", fontSize:13, fontWeight:700, cursor:"pointer" }}>
                {c.name}
              </button>
            ))}
          </div>
        </div>
        <Input label="Date" type="date" value={tallyPastDate} onChange={e=>setTallyPastDate(e.target.value)} style={{ fontSize:15 }} />
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:11, fontWeight:800, textTransform:"uppercase", letterSpacing:"0.07em", color:"#8a94a6", marginBottom:8 }}>Number of Tallies to Add</div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:10 }}>
            {[1,2,3,4,5,10].map(n => (
              <button key={n} onClick={()=>setTallyPastCount(String(n))}
                style={{ width:44, height:44, background: tallyPastCount===String(n)?"#1e2a3a":"#f0f4f8", color: tallyPastCount===String(n)?"#fff":"#8a94a6", border:"none", borderRadius:10, fontFamily:"inherit", fontSize:15, fontWeight:800, cursor:"pointer" }}>{n}</button>
            ))}
          </div>
          <Input label="Or type a custom number" type="number" min="1" placeholder="e.g. 7" value={tallyPastCount} onChange={e=>setTallyPastCount(e.target.value)} />
        </div>
        {tallyPastClass && tallyPastDate && (() => {
          const cls = tallyClasses.find(c=>c.id===tallyPastClass);
          const existing = cls ? cls.tallies.filter(t=>t.date===tallyPastDate).reduce((s,t)=>s+t.count,0) : 0;
          if (existing > 0) return <div style={{ background:"#fef9e7", border:"1px solid #f9e79f", borderRadius:10, padding:"10px 14px", fontSize:13, color:"#9a7d0a", fontWeight:600, marginBottom:14 }}>⚠️ {cls?.name} already has <strong>{existing}</strong> talli{existing!==1?"es":"s"} on this date. Adding will increase the total.</div>;
          return null;
        })()}
        <div style={{ display:"flex", gap:10 }}>
          <Btn onClick={()=>setTallyPastOpen(false)} color="#f0f4f8" textColor="#1e2a3a" style={{flex:1}}>Cancel</Btn>
          <Btn onClick={()=>{addPastTally();}} style={{flex:1}}>✅ Add Tallies</Btn>
        </div>
      </Modal>

      {/* Tally Edit Modal */}
      <Modal open={tallyEditOpen} onClose={()=>setTallyEditOpen(false)} title="✏️ Edit Class">
        <Input label="Class Name" placeholder="e.g. 1st Period" value={tallyEditName} onChange={e=>setTallyEditName(e.target.value)} />
        <Input label="Prize Description" placeholder="e.g. Pizza Party" value={tallyEditPrize} onChange={e=>setTallyEditPrize(e.target.value)} />
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:11, fontWeight:800, textTransform:"uppercase", letterSpacing:"0.07em", color:"#8a94a6", marginBottom:8 }}>Class Color</div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {["#3498db","#e74c3c","#2ecc71","#f39c12","#9b59b6","#1abc9c","#e67e22","#34495e"].map(col=>(
              <button key={col} onClick={()=>setTallyEditColor(col)} style={{ width:36, height:36, background:col, border: tallyEditColor===col?"3px solid #1e2a3a":"3px solid transparent", borderRadius:10, cursor:"pointer" }} />
            ))}
          </div>
        </div>
        <div style={{ display:"flex", gap:10 }}>
          <Btn onClick={()=>setTallyEditOpen(false)} color="#f0f4f8" textColor="#1e2a3a" style={{flex:1}}>Cancel</Btn>
          <Btn onClick={saveTallyEdit} style={{flex:1}}>Save</Btn>
        </div>
      </Modal>

      {/* Payday Schedule Modal */}
      <Modal open={scheduleOpen} onClose={()=>setScheduleOpen(false)} title="⏰ Payday Schedule" subtitle="Set up automatic weekly paydays so you never forget!" wide>
        <label style={{ display:"flex", alignItems:"center", gap:10, fontWeight:700, fontSize:15, marginBottom:20, cursor:"pointer", padding:"14px 16px", background: scheduleEnabled ? "#d5f5e3" : "#f0f4f8", borderRadius:12 }}>
          <input type="checkbox" checked={scheduleEnabled} onChange={e=>setScheduleEnabled(e.target.checked)} style={{ width:18, height:18 }} />
          <span style={{ color: scheduleEnabled ? "#27ae60" : "#8a94a6" }}>{scheduleEnabled ? "✅ Schedule is ON" : "Schedule is OFF — click to enable"}</span>
        </label>
        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:11, fontWeight:800, textTransform:"uppercase", letterSpacing:"0.07em", color:"#8a94a6", marginBottom:8 }}>Payday Frequency</div>
          <div style={{ display:"flex", gap:8 }}>
            {[{val:"weekly",label:"📅 Every Week"},{val:"biweekly",label:"📅 Every 2 Weeks"}].map(f=>(
              <button key={f.val} onClick={()=>setScheduleFreq(f.val)} style={{ flex:1, padding:"10px", background: scheduleFreq===f.val?"#1e2a3a":"#f0f4f8", color: scheduleFreq===f.val?"#fff":"#8a94a6", border:"none", borderRadius:10, fontFamily:"inherit", fontSize:13, fontWeight:700, cursor:"pointer" }}>{f.label}</button>
            ))}
          </div>
        </div>
        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:11, fontWeight:800, textTransform:"uppercase", letterSpacing:"0.07em", color:"#8a94a6", marginBottom:8 }}>Payday Day</div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {[{val:1,label:"Mon"},{val:2,label:"Tue"},{val:3,label:"Wed"},{val:4,label:"Thu"},{val:5,label:"Fri"}].map(d=>(
              <button key={d.val} onClick={()=>setScheduleDay(d.val)} style={{ flex:1, padding:"10px 6px", background: scheduleDay===d.val?"#f39c12":"#f0f4f8", color: scheduleDay===d.val?"#fff":"#8a94a6", border:"none", borderRadius:10, fontFamily:"inherit", fontSize:13, fontWeight:700, cursor:"pointer" }}>{d.label}</button>
            ))}
          </div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
          <Input label="Amount per Student ($)" type="number" min="0.01" step="0.01" placeholder="e.g. 10.00" value={scheduleAmt} onChange={e=>setScheduleAmt(e.target.value)} />
          <Input label="Note" placeholder="Weekly Allowance" value={scheduleNote} onChange={e=>setScheduleNote(e.target.value)} />
        </div>
        <div style={{ background:"#fef9e7", border:"1px solid #f9e79f", borderRadius:10, padding:"10px 14px", fontSize:13, color:"#9a7d0a", fontWeight:600, marginBottom:16 }}>
          ⚠️ Payday runs automatically when you open the Teacher Portal on the scheduled day. Make sure to open the app on payday!
        </div>
        <div style={{ display:"flex", gap:10 }}>
          <Btn onClick={()=>setScheduleOpen(false)} color="#f0f4f8" textColor="#1e2a3a" style={{flex:1}}>Cancel</Btn>
          <Btn onClick={saveSchedule} color="#f39c12" style={{flex:1}}>💾 Save Schedule</Btn>
        </div>
      </Modal>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  ROOT
// ════════════════════════════════════════════════════════════
function App() {
  const [db, setDb] = useState(null);
  const [screen, setScreen] = useState("landing");
  const [studentId, setStudentId] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => { loadDB().then(data => { setDb(data); setLoading(false); }); }, []);

  useEffect(() => {
    const interval = setInterval(async () => {
      if (screen === "student" || screen === "teacher") {
        const fresh = await loadDB();
        setDb(fresh);
      }
    }, 15000);
    return () => clearInterval(interval);
  }, [screen]);

  if (loading) return (
    <div style={{ minHeight:"100vh",background:"linear-gradient(135deg,#0d1b2a,#0f3460)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16 }}>
      <div style={{ fontSize:52,animation:"float 1.5s ease-in-out infinite" }}>🏦</div>
      <div style={{ color:"rgba(255,255,255,0.6)",fontWeight:700,fontSize:15 }}>Loading Connecting America…</div>
    </div>
  );

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
      `}</style>
      {screen==="landing" && <Landing onStudent={()=>setScreen("studentLogin")} onTeacher={()=>setScreen("teacherLogin")} />}
      {screen==="studentLogin" && <StudentLogin db={db} onLogin={sid=>{setStudentId(sid);setScreen("student");}} onBack={()=>setScreen("landing")} />}
      {screen==="teacherLogin" && <TeacherLogin db={db} onLogin={()=>setScreen("teacher")} onBack={()=>setScreen("landing")} />}
      {screen==="student" && db && <StudentDashboard db={db} setDb={setDb} studentId={studentId} onLogout={()=>{setStudentId(null);setScreen("landing");}} />}
      {screen==="teacher" && db && <TeacherDashboard db={db} setDb={setDb} onLogout={()=>setScreen("landing")} />}
      <Snackbar />
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
