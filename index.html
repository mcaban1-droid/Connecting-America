// ─── STORAGE (localStorage for standalone deploy) ────────────
async function loadDB() {
  try {
    const raw = localStorage.getItem("classCashDB_v2");
    if (raw) {
      const parsed = JSON.parse(raw);
      if (!parsed.storeItems) parsed.storeItems = DEFAULT_STORE_ITEMS;
      return parsed;
    }
  } catch {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
async function saveDB(data) {
  try { localStorage.setItem("classCashDB_v2", JSON.stringify(data)); } catch(e) { console.error("Save failed", e); }
}

// ─── UI PRIMITIVES ───────────────────────────────────────────
const Input = ({ label, ...props }) => (
  <div style={{ marginBottom: 14 }}>
    {label && <div style={{ fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: "0.07em", color: "#8a94a6", marginBottom: 6 }}>{label}</div>}
    <input {...props} style={{ width: "100%", padding: "13px 14px", border: "2px solid #e4e9f0", borderRadius: 12, fontFamily: "inherit", fontSize: 15, fontWeight: 600, color: "#1e2a3a", background: "#fff", boxSizing: "border-box", outline: "none", transition: "border-color .2s", ...props.style }}

const Select = ({ label, children, ...props }) => (

const Btn = ({ children, color = "#2ecc71", textColor = "#fff", onClick, style = {}, disabled }) => (

    onMouseEnter={e => { if (!disabled) { e.currentTarget.style.filter = "brightness(1.08)"; e.currentTarget.style.transform = "translateY(-1px)"; }}}

const Card = ({ children, style = {} }) => (

const Tag = ({ type }) => {
  const map = { deposit: ["#d5f5e3","#1e8449"], withdraw: ["#fadbd8","#c0392b"], bonus: ["#fef9e7","#9a7d0a"], penalty: ["#e8daef","#7d3c98"], transfer: ["#d6eaf8","#1a5276"], purchase: ["#fde8d8","#c0550a"] };

  return <span style={{ background: bg, color, padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: "0.05em" }}>{type}</span>;
};

// ─── SNACKBAR ────────────────────────────────────────────────
let _setSnack = null;
function showSnack(msg, type = "info") { _setSnack?.({ msg, type, key: Date.now() }); }
function Snackbar() {
  const [snack, setSnack] = useState(null);
  _setSnack = setSnack;
  useEffect(() => { if (snack) { const t = setTimeout(() => setSnack(null), 2800); return () => clearTimeout(t); } }, [snack?.key]);
  if (!snack) return null;
  const bg = snack.type === "success" ? "#27ae60" : snack.type === "error" ? "#e74c3c" : "#1e2a3a";
  return <div style={{ position: "fixed", bottom: 28, left: "50%", transform: "translateX(-50%)", background: bg, color: "#fff", padding: "13px 28px", borderRadius: 50, fontWeight: 700, fontSize: 14, boxShadow: "0 8px 28px rgba(0,0,0,0.22)", zIndex: 9999, whiteSpace: "nowrap", animation: "fadeIn .3s" }}>{snack.msg}</div>;
}

// ─── MODAL ───────────────────────────────────────────────────
function Modal({ open, onClose, title, subtitle, children, wide }) {
  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 20, backdropFilter: "blur(4px)" }}>
      <div onClick={e => e.stopPropagation()} style={{ background: "#fff", borderRadius: 24, padding: 32, width: "100%", maxWidth: wide ? 560 : 420, boxShadow: "0 20px 60px rgba(0,0,0,0.25)", animation: "slideUp .22s ease", maxHeight: "90vh", overflowY: "auto" }}>
        <div style={{ fontFamily: "'Baloo 2', cursive", fontSize: 22, fontWeight: 800, marginBottom: 4 }}>{title}</div>
        {subtitle && <div style={{ color: "#8a94a6", fontSize: 13, marginBottom: 22 }}>{subtitle}</div>}
        {children}
      </div>
    </div>
  );
}

        <button onClick={onLogout} style={{ background: "rgba(255,255,255,0.12)", border: "1px solid rgba(255,255,255,0.2)", color: "#fff", padding: "7px 14px", borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>Logout</button>

// ════════════════════════════════════════════════════════════
//  STUDENT LOGIN
// ════════════════════════════════════════════════════════════
function StudentLogin({ db, onLogin, onBack }) {
  const [sid, setSid] = useState(""); const [pin, setPin] = useState(""); const [err, setErr] = useState("");
  const login = () => {
    if (!sid) { setErr("Please select your name."); return; }
    const s = db.students.find(s => s.id === sid && !s.archived);
    if (!s || s.pin !== pin) { setErr("Incorrect PIN. Try again!"); return; }
    onLogin(s.id);
  };
  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #0d1b2a, #0f3460)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ background: "#fff", borderRadius: 24, padding: "40px 36px", width: "100%", maxWidth: 400, boxShadow: "0 20px 60px rgba(0,0,0,0.3)" }}>
        <div style={{ fontFamily: "'Baloo 2', cursive", fontSize: 28, fontWeight: 800, marginBottom: 4 }}>🎒 Student Login</div>
        <div style={{ color: "#8a94a6", fontSize: 14, marginBottom: 28 }}>Select your name and enter your PIN.</div>
        {err && <div style={{ background: "#fadbd8", color: "#e74c3c", padding: "10px 14px", borderRadius: 10, fontSize: 14, fontWeight: 700, marginBottom: 16 }}>{err}</div>}
        <Select label="Your Name" value={sid} onChange={e => { setSid(e.target.value); setErr(""); }}>
          <option value="">-- Choose your name --</option>
          {db.students.filter(s => !s.archived).map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
        </Select>
        <Input label="PIN" type="password" inputMode="numeric" maxLength={6} placeholder="Enter your PIN" value={pin} onChange={e => { setPin(e.target.value); setErr(""); }} onKeyDown={e => e.key === "Enter" && login()} />
        <Btn onClick={login} style={{ width: "100%", marginTop: 4 }}>Access My Account →</Btn>
        <button onClick={onBack} style={{ background: "none", border: "none", color: "#8a94a6", fontFamily: "inherit", fontSize: 14, fontWeight: 700, cursor: "pointer", width: "100%", marginTop: 14, padding: 8 }}>← Back</button>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  STUDENT DASHBOARD
// ════════════════════════════════════════════════════════════
function StudentDashboard({ db, setDb, studentId, onLogout }) {
  const [tab, setTab] = useState("bank");
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [transferOpen, setTransferOpen] = useState(false);
  const [toId, setToId] = useState(""); const [txAmt, setTxAmt] = useState(""); const [txNote, setTxNote] = useState("");
  const [catFilter, setCatFilter] = useState("All");
  const [receiptItems, setReceiptItems] = useState(null);

  const student = db.students.find(s => s.id === studentId);
  const myTx = db.transactions.filter(t => t.studentId === studentId || t.toStudentId === studentId).slice().reverse().slice(0, 30);
  const others = db.students.filter(s => !s.archived && s.id !== studentId);
  const cartTotal = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const cartCount = cart.reduce((s, c) => s + c.qty, 0);

  const addToCart = (item) => {
    if (item.stock !== 999 && cart.filter(c => c.id === item.id).reduce((s,c)=>s+c.qty,0) >= item.stock) {
      showSnack("Not enough stock!", "error"); return;
    }
    setCart(prev => {
      const ex = prev.find(c => c.id === item.id);
      if (ex) return prev.map(c => c.id === item.id ? { ...c, qty: c.qty + 1 } : c);
      return [...prev, { ...item, qty: 1 }];
    });
    showSnack(`${item.emoji} Added to cart!`, "success");
  };

  const removeFromCart = (id) => setCart(prev => prev.filter(c => c.id !== id));
  const updateQty = (id, qty) => {
    if (qty < 1) { removeFromCart(id); return; }
    setCart(prev => prev.map(c => c.id === id ? { ...c, qty } : c));
  };

  const checkout = async () => {
    if (student.balance < cartTotal) { showSnack("Insufficient funds!", "error"); return; }
    const newDB = { ...db, students: db.students.map(s => ({ ...s })), transactions: [...db.transactions], storeItems: db.storeItems.map(i => ({ ...i })) };
    const st = newDB.students.find(s => s.id === studentId);
    st.balance = Math.round((st.balance - cartTotal) * 100) / 100;

    cart.forEach(c => {
      const item = newDB.storeItems.find(i => i.id === c.id);
      if (item && item.stock !== 999) item.stock = Math.max(0, item.stock - c.qty);
      newDB.transactions.push({
        id: Date.now().toString() + c.id,
        type: "purchase",
        studentId,
        amount: c.price * c.qty,
        note: `🛍️ ${c.qty > 1 ? c.qty + "x " : ""}${c.name}`,
        itemId: c.id,
        date: nowISO(),
      });
    });

    await saveDB(newDB);
    setDb(newDB);
    setReceiptItems([...cart]);
    setCart([]);
    setCartOpen(false);
  };

  const doTransfer = async () => {
    const a = parseFloat(txAmt);
    if (!toId || isNaN(a) || a <= 0) { showSnack("Fill in all fields.", "error"); return; }
    if (student.balance < a) { showSnack("Not enough funds!", "error"); return; }
    const newDB = { ...db, students: db.students.map(s => ({ ...s })), transactions: [...db.transactions] };
    const st = newDB.students.find(s => s.id === studentId);
    const toSt = newDB.students.find(s => s.id === toId);
    st.balance = Math.round((st.balance - a) * 100) / 100;
    toSt.balance = Math.round((toSt.balance + a) * 100) / 100;
    newDB.transactions.push({ id: Date.now().toString(), type: "transfer", studentId, toStudentId: toId, amount: a, note: txNote || "Transfer", date: nowISO() });
    await saveDB(newDB);
    setDb(newDB);
    setTransferOpen(false); setTxAmt(""); setTxNote(""); setToId("");
    showSnack(`💸 Sent ${fmt(a)} to ${toSt.name}!`, "success");
  };

  const tabs = [{ key: "bank", icon: "🏦", label: "My Bank" }, { key: "store", icon: "🛍️", label: "School Store" }, { key: "tally", icon: "🏆", label: "Leaderboard" }];
  const storeItems = (db.storeItems || []).filter(i => catFilter === "All" || i.category === catFilter);

  return (
    <div style={{ minHeight: "100vh", background: "#f0f4f8" }}>
      <Topbar label={student.name} onLogout={onLogout} cartCount={cartCount} onCartClick={() => setCartOpen(true)} />

      {/* Tab Bar */}
      <div style={{ background: "#fff", borderBottom: "2px solid #f0f4f8", display: "flex", justifyContent: "center", gap: 4, padding: "6px 16px" }}>
        {tabs.map(t => (
          <button key={t.key} onClick={() => setTab(t.key)} style={{ padding: "10px 28px", background: tab === t.key ? "#1e2a3a" : "none", color: tab === t.key ? "#fff" : "#8a94a6", border: "none", borderRadius: 10, fontFamily: "inherit", fontSize: 14, fontWeight: 700, cursor: "pointer", transition: "all .2s", display: "flex", alignItems: "center", gap: 6 }}>
            <span>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>

      <div style={{ maxWidth: 640, margin: "0 auto", padding: "24px 16px" }}>

        {/* ── BANK TAB ── */}
        {tab === "bank" && (
          <>
            {/* Balance Card */}
            <div style={{ background: "linear-gradient(135deg, #2ecc71, #27ae60)", borderRadius: 22, padding: "30px 28px", color: "#fff", marginBottom: 20, boxShadow: "0 8px 32px rgba(46,204,113,0.35)", position: "relative", overflow: "hidden" }}>
              <div style={{ position: "absolute", right: 20, top: 16, fontSize: 64, opacity: 0.15 }}>💵</div>
              <div style={{ fontSize: 12, fontWeight: 800, textTransform: "uppercase", letterSpacing: "0.1em", opacity: 0.85, marginBottom: 6 }}>Current Balance</div>
              <div style={{ fontFamily: "'Baloo 2', cursive", fontSize: 52, fontWeight: 800, lineHeight: 1 }}>{fmt(student.balance)}</div>
              <div style={{ marginTop: 10, fontSize: 14, opacity: 0.8, fontWeight: 600 }}>👤 {student.name} · ID: {student.id}</div>
            </div>

            {/* Quick actions */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
              <button onClick={() => setTab("store")} style={{ background: "#fff", border: "2px solid #e4e9f0", borderRadius: 14, padding: 16, cursor: "pointer", fontFamily: "inherit", fontWeight: 700, fontSize: 14, color: "#1e2a3a", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, boxShadow: "0 4px 16px rgba(0,0,0,0.06)", transition: "border-color .2s" }} onMouseEnter={e => e.currentTarget.style.borderColor="#f39c12"} onMouseLeave={e => e.currentTarget.style.borderColor="#e4e9f0"}>
                🛍️ Go to School Store
              </button>
              {others.length > 0 && (
                <button onClick={() => setTransferOpen(true)} style={{ background: "#fff", border: "2px solid #e4e9f0", borderRadius: 14, padding: 16, cursor: "pointer", fontFamily: "inherit", fontWeight: 700, fontSize: 14, color: "#1e2a3a", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, boxShadow: "0 4px 16px rgba(0,0,0,0.06)", transition: "border-color .2s" }} onMouseEnter={e => e.currentTarget.style.borderColor="#3498db"} onMouseLeave={e => e.currentTarget.style.borderColor="#e4e9f0"}>
                  💸 Send Money
                </button>
              )}
            </div>

                        </div>
                        <div style={{ fontSize:12, color:"#8a94a6", marginBottom:8 }}>🎁 {c.prize || "Prize TBD"}</div>
                        <div style={{ height:8, background:"#f0f4f8", borderRadius:10, overflow:"hidden" }}>
                          <div style={{ height:"100%", width:`${Math.min(100, total * 5)}%`, background:c.color, borderRadius:10, transition:"width .4s" }} />
                        </div>
                      </div>
                      <div style={{ textAlign:"center" }}>
                        <div style={{ fontFamily:"'Baloo 2',cursive", fontSize:42, fontWeight:800, color:c.color }}>{total}</div>
                        <div style={{ fontSize:11, color:"#8a94a6", fontWeight:700 }}>tallies</div>
                      </div>
                    </div>
                  </div>
                );
              })}
              {classes.length === 0 && <div style={{ textAlign:"center", padding:40, color:"#8a94a6" }}><div style={{ fontSize:40, marginBottom:10 }}>🏆</div><div style={{ fontWeight:600 }}>No classes set up yet.</div></div>}
            </div>
          );
        })()}

      {/* ── CART MODAL ── */}
      <Modal open={cartOpen} onClose={() => setCartOpen(false)} title="🛒 Your Cart" subtitle="Review your items before checking out." wide>
        {cart.length === 0
          ? <div style={{ textAlign: "center", padding: "24px 0", color: "#8a94a6" }}><div style={{ fontSize: 36, marginBottom: 8 }}>🛒</div><div style={{ fontWeight: 600 }}>Your cart is empty</div></div>
          : <>
              {cart.map(c => (
                <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 0", borderBottom: "1px solid #f0f4f8" }}>
                  <div style={{ width:44, height:44, borderRadius:10, overflow:"hidden", flexShrink:0, background:"#f8fafc", display:"flex", alignItems:"center", justifyContent:"center" }}>
                    {c.image ? <img src={c.image} alt={c.name} style={{ width:"100%",height:"100%",objectFit:"cover" }} /> : <span style={{ fontSize:24 }}>{c.emoji}</span>}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 14 }}>{c.name}</div>
                    <div style={{ fontSize: 12, color: "#8a94a6" }}>{fmt(c.price)} each</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <button onClick={() => updateQty(c.id, c.qty - 1)} style={{ width: 28, height: 28, borderRadius: 8, border: "2px solid #e4e9f0", background: "#fff", cursor: "pointer", fontWeight: 800, fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center" }}>−</button>
                    <span style={{ fontWeight: 800, fontSize: 14, minWidth: 20, textAlign: "center" }}>{c.qty}</span>
                    <button onClick={() => updateQty(c.id, c.qty + 1)} style={{ width: 28, height: 28, borderRadius: 8, border: "2px solid #e4e9f0", background: "#fff", cursor: "pointer", fontWeight: 800, fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
                  </div>
                  <div style={{ fontFamily: "'Baloo 2', cursive", fontSize: 16, fontWeight: 800, color: "#1e2a3a", minWidth: 54, textAlign: "right" }}>{fmt(c.price * c.qty)}</div>
                  <button onClick={() => removeFromCart(c.id)} style={{ background: "none", border: "none", color: "#e74c3c", cursor: "pointer", fontSize: 18, padding: 4 }}>✕</button>
                </div>
              ))}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 0 8px", borderTop: "2px solid #f0f4f8", marginTop: 8 }}>
                <div>
                  <div style={{ fontWeight: 700, color: "#8a94a6", fontSize: 13 }}>Your Balance: {fmt(student.balance)}</div>
                  <div style={{ fontWeight: 700, color: "#8a94a6", fontSize: 13 }}>After Purchase: {fmt(student.balance - cartTotal)}</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 12, color: "#8a94a6", fontWeight: 700 }}>Total</div>
                  <div style={{ fontFamily: "'Baloo 2', cursive", fontSize: 28, fontWeight: 800, color: "#1e2a3a" }}>{fmt(cartTotal)}</div>
                </div>
              </div>
              {student.balance < cartTotal && <div style={{ background: "#fadbd8", color: "#e74c3c", padding: "10px 14px", borderRadius: 10, fontSize: 13, fontWeight: 700, marginBottom: 12 }}>⚠️ Not enough funds! Remove some items.</div>}
              <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
                <Btn onClick={() => setCartOpen(false)} color="#f0f4f8" textColor="#1e2a3a" style={{ flex: 1 }}>Keep Shopping</Btn>
                <Btn onClick={checkout} disabled={student.balance < cartTotal} color="#f39c12" style={{ flex: 1 }}>✅ Checkout {fmt(cartTotal)}</Btn>
              </div>
            </>
        }
      </Modal>

      {/* ── RECEIPT MODAL ── */}
      <Modal open={!!receiptItems} onClose={() => setReceiptItems(null)} title="🎉 Purchase Complete!" subtitle="Your items have been deducted from your balance.">
        {receiptItems?.map((c, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderBottom: "1px solid #f0f4f8" }}>
            <div style={{ width:38, height:38, borderRadius:9, overflow:"hidden", flexShrink:0, background:"#f8fafc", display:"flex", alignItems:"center", justifyContent:"center" }}>
              {c.image ? <img src={c.image} alt={c.name} style={{ width:"100%",height:"100%",objectFit:"cover" }} /> : <span style={{ fontSize:22 }}>{c.emoji}</span>}
            </div>
            <span style={{ flex: 1, fontWeight: 700 }}>{c.qty > 1 ? `${c.qty}x ` : ""}{c.name}</span>
            <span style={{ fontFamily: "'Baloo 2', cursive", fontWeight: 800, color: "#e74c3c" }}>-{fmt(c.price * c.qty)}</span>
          </div>
        ))}
        <div style={{ background: "#d5f5e3", borderRadius: 12, padding: "14px 16px", marginTop: 16, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontWeight: 700, color: "#1e8449" }}>New Balance</span>
          <span style={{ fontFamily: "'Baloo 2', cursive", fontSize: 22, fontWeight: 800, color: "#27ae60" }}>{fmt(db.students.find(s => s.id === studentId)?.balance)}</span>
        </div>
        <Btn onClick={() => setReceiptItems(null)} style={{ width: "100%", marginTop: 16 }}>Done 🎉</Btn>
      </Modal>

      {/* ── TRANSFER MODAL ── */}
      <Modal open={transferOpen} onClose={() => setTransferOpen(false)} title="💸 Send Money" subtitle="Transfer class cash to a classmate.">
        <Select label="Send To" value={toId} onChange={e => setToId(e.target.value)}>
          <option value="">-- Select classmate --</option>
          {others.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
        </Select>
        <Input label="Amount ($)" type="number" min="0.01" step="0.01" placeholder="0.00" value={txAmt} onChange={e => setTxAmt(e.target.value)} />
        <Input label="Note (optional)" placeholder="What's it for?" value={txNote} onChange={e => setTxNote(e.target.value)} />
        <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
          <Btn onClick={() => setTransferOpen(false)} color="#f0f4f8" textColor="#1e2a3a" style={{ flex: 1 }}>Cancel</Btn>
          <Btn onClick={doTransfer} style={{ flex: 1 }}>Send 💸</Btn>
        </div>
      </Modal>
    </div>
  );
}

//  TEACHER DASHBOARD
// ════════════════════════════════════════════════════════════
function TeacherDashboard({ db, setDb, onLogout }) {
  const [tab, setTab] = useState("students");
  const [showArchived, setShowArchived] = useState(false);
  // Tally Tracker
  const [tallyClasses, setTallyClasses] = useState(() => {
    try { return JSON.parse(localStorage.getItem("tallyClasses") || "null") || [
      { id: "p1", name: "1st Period", color: "#3498db", tallies: [], prize: "Class Party" },
      { id: "p2", name: "2nd Period", color: "#e74c3c", tallies: [], prize: "Class Party" }
    ]; } catch { return [
      { id: "p1", name: "1st Period", color: "#3498db", tallies: [], prize: "Class Party" },
      { id: "p2", name: "2nd Period", color: "#e74c3c", tallies: [], prize: "Class Party" }
    ]; }
  });
  const [tallyEditOpen, setTallyEditOpen] = useState(false);
  const [tallyEditClass, setTallyEditClass] = useState(null);
  const [tallyEditName, setTallyEditName] = useState("");
  const [tallyEditPrize, setTallyEditPrize] = useState("");
  const [tallyEditColor, setTallyEditColor] = useState("#3498db");
  const [tallyPastOpen, setTallyPastOpen] = useState(false);
  const [tallyPastClass, setTallyPastClass] = useState(null);
  const [tallyPastDate, setTallyPastDate] = useState("");
  const [tallyPastCount, setTallyPastCount] = useState("1");
  const [reportView, setReportView] = useState("transactions");
  // Sort state
  const [txSort, setTxSort] = useState("date_desc");
  const [cardSort, setCardSort] = useState("name_asc");
  const [storeSort, setStoreSort] = useState("name_asc");

  // Transaction form
  const [txType, setTxType] = useState("deposit"); const [txSid, setTxSid] = useState(""); const [txToSid, setTxToSid] = useState(""); const [txAmt, setTxAmt] = useState(""); const [txNote, setTxNote] = useState("");
  // Weekly
  const [wkAmt, setWkAmt] = useState(""); const [wkNote, setWkNote] = useState("Weekly Allowance");
  // Payday Schedule
  const [scheduleOpen, setScheduleOpen] = useState(false);
  const [scheduleEnabled, setScheduleEnabled] = useState(() => {
    try { return JSON.parse(localStorage.getItem("paydaySchedule") || "{}").enabled || false; } catch { return false; }
  });
  const [scheduleDay, setScheduleDay] = useState(() => {
    try { return JSON.parse(localStorage.getItem("paydaySchedule") || "{}").day ?? 5; } catch { return 5; }
  });
  const [scheduleAmt, setScheduleAmt] = useState(() => {
    try { return JSON.parse(localStorage.getItem("paydaySchedule") || "{}").amount || ""; } catch { return ""; }
  });
  const [scheduleNote, setScheduleNote] = useState(() => {
    try { return JSON.parse(localStorage.getItem("paydaySchedule") || "{}").note || "Weekly Allowance"; } catch { return "Weekly Allowance"; }
  });
  const [scheduleFreq, setScheduleFreq] = useState(() => {
    try { return JSON.parse(localStorage.getItem("paydaySchedule") || "{}").freq || "weekly"; } catch { return "weekly"; }
  });
  // Fees
  const [feeAmt, setFeeAmt] = useState(""); const [feeNote, setFeeNote] = useState(""); const [feeType, setFeeType] = useState("Rent"); const [feeStudents, setFeeStudents] = useState("all"); const [feeSelected, setFeeSelected] = useState([]);
  // Add student
  const [newName, setNewName] = useState(""); const [newId, setNewId] = useState(""); const [newPin, setNewPin] = useState(""); const [newBal, setNewBal] = useState("0");
  // Filters
  const [fSid, setFSid] = useState(""); const [fType, setFType] = useState(""); const [fFrom, setFFrom] = useState(""); const [fTo, setFTo] = useState("");
  // Passwords
  const [curPw, setCurPw] = useState(""); const [newPw, setNewPw] = useState("");
  // Modals
  const [detailSid, setDetailSid] = useState(null); const [detailPin, setDetailPin] = useState("");
  const [confirm, setConfirm] = useState(null);
  // Store item form
  const [itemName, setItemName] = useState(""); const [itemPrice, setItemPrice] = useState(""); const [itemEmoji, setItemEmoji] = useState("🖊️"); const [itemCat, setItemCat] = useState("Physical"); const [itemStock, setItemStock] = useState(""); const [itemDesc, setItemDesc] = useState(""); const [itemUnlimited, setItemUnlimited] = useState(false); const [itemImage, setItemImage] = useState("");
  const [editingItem, setEditingItem] = useState(null);
  const [emojiPickerOpen, setEmojiPickerOpen] = useState(false);

  const active = db.students.filter(s => !s.archived);
  const totalBal = active.reduce((s, st) => s + st.balance, 0);
  const thisWeek = db.transactions.filter(t => (Date.now() - new Date(t.date)) < 7 * 86400000).length;

  const persist = async (updated) => { setDb({ ...updated }); await saveDB(updated); };

  // ── Tally functions
  const addTally = (classId) => {
    const today = new Date().toISOString().slice(0, 10);
    const updated = tallyClasses.map(c => c.id === classId ? { ...c, tallies: [...c.tallies, { date: today, count: 1 }] } : c);
    setTallyClasses(updated);
    localStorage.setItem("tallyClasses", JSON.stringify(updated));
  };
  const removeTally = (classId) => {
    const updated = tallyClasses.map(c => {
      if (c.id !== classId || c.tallies.length === 0) return c;
      return { ...c, tallies: c.tallies.slice(0, -1) };
    });
    setTallyClasses(updated);
    localStorage.setItem("tallyClasses", JSON.stringify(updated));
  };
  const resetTallies = (classId) => {
    const updated = tallyClasses.map(c => c.id === classId ? { ...c, tallies: [] } : c);
    setTallyClasses(updated);
    localStorage.setItem("tallyClasses", JSON.stringify(updated));
  };
  const saveTallyEdit = () => {
    if (!tallyEditName) { showSnack("Enter a class name.", "error"); return; }
    const updated = tallyClasses.map(c => c.id === tallyEditClass ? { ...c, name: tallyEditName, prize: tallyEditPrize, color: tallyEditColor } : c);
    setTallyClasses(updated);
    localStorage.setItem("tallyClasses", JSON.stringify(updated));
    setTallyEditOpen(false);
    showSnack("Class updated!", "success");
  };
  const addTallyClass = () => {
    const newClass = { id: "p" + Date.now(), name: `Period ${tallyClasses.length + 1}`, color: ["#3498db","#e74c3c","#2ecc71","#9b59b6","#f39c12","#1abc9c"][tallyClasses.length % 6], tallies: [], prize: "Class Party" };
    const updated = [...tallyClasses, newClass];
    setTallyClasses(updated);
    localStorage.setItem("tallyClasses", JSON.stringify(updated));
    showSnack(`${newClass.name} added!`, "success");
  };
  const addPastTally = () => {
    if (!tallyPastDate) { showSnack("Please select a date.", "error"); return; }
    const count = parseInt(tallyPastCount) || 1;
    if (count < 1) { showSnack("Enter at least 1 tally.", "error"); return; }
    const today = new Date().toISOString().slice(0, 10);
    if (tallyPastDate > today) { showSnack("Date cannot be in the future.", "error"); return; }

      if (schedule.lastRun === todayStr) return; // already ran today
      let shouldRun = false;
      if (schedule.freq === "weekly" && todayDay === parseInt(schedule.day)) shouldRun = true;
      if (schedule.freq === "biweekly" && todayDay === parseInt(schedule.day)) {
        // Check if it's been at least 13 days since last run

  const handleImportFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setImportFile(file);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(ev.target.result, { type: "array" });
        const preview = [];
        wb.SheetNames.forEach(sheetName => {
          if (sheetName.toLowerCase() === "sheet1" || sheetName.toLowerCase() === "summary") return;
          const ws = wb.Sheets[sheetName];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
          if (rows.length < 2) return;
          // Find header row
          const headerRow = rows[0].map(h => String(h || "").toLowerCase().trim());
          const dateIdx = headerRow.findIndex(h => h.includes("date"));
          const debitIdx = headerRow.findIndex(h => h.includes("debit"));
          const creditIdx = headerRow.findIndex(h => h.includes("credit"));
          const descIdx = headerRow.findIndex(h => h.includes("desc") || h.includes("note") || h.includes("memo"));
          const balIdx = headerRow.findIndex(h => h.includes("bal"));
          const transactions = [];
          let lastBalance = 0;
          rows.slice(1).forEach(row => {
            if (!row || row.every(c => !c)) return;
            const debit = parseFloat(String(row[debitIdx] || "0").replace(/[$,]/g,"")) || 0;
            const credit = parseFloat(String(row[creditIdx] || "0").replace(/[$,]/g,"")) || 0;
            const bal = parseFloat(String(row[balIdx] || "0").replace(/[$,]/g,"")) || 0;
            const desc = String(row[descIdx] || "").trim();
            const dateRaw = row[dateIdx];
            let dateVal = new Date().toISOString();
            if (dateRaw !== undefined && dateRaw !== null && dateRaw !== "") {
              if (typeof dateRaw === "number" && dateRaw > 1) {
                // Excel serial date — must be > 1 to avoid epoch/zero issues
                const excelEpoch = new Date(1899, 11, 30);
                const d = new Date(excelEpoch.getTime() + dateRaw * 86400000);
                // Sanity check: must be between year 2000 and 2100
                if (!isNaN(d) && d.getFullYear() >= 2000 && d.getFullYear() <= 2100) {
                  dateVal = d.toISOString();
                }
              } else if (typeof dateRaw === "string" && dateRaw.trim() !== "") {
                const str = dateRaw.trim();
                const d = new Date(str);
                if (!isNaN(d) && d.getFullYear() >= 2000 && d.getFullYear() <= 2100) {
                  const offset = d.getTimezoneOffset() * 60000;
                  dateVal = new Date(d.getTime() + offset).toISOString();
                }
              }
              // If date is still invalid or out of range, dateVal stays as today
            }
            if (bal) lastBalance = bal;
            if (debit > 0 || credit > 0) {
              transactions.push({
                type: debit > 0 ? "withdraw" : "deposit",
                amount: debit > 0 ? debit : credit,
                note: desc || (debit > 0 ? "withdraw" : "deposit"),
                date: dateVal,
              });
            }
          });
          preview.push({ name: sheetName, balance: lastBalance, txCount: transactions.length, transactions });
        });
        setImportPreview(preview);
        showSnack(`Found ${preview.length} students in file!`, "success");
      } catch(err) {
        showSnack("Could not read file. Make sure it's an .xlsx file.", "error");
        console.error(err);
      }
    };

      <div style={{ maxWidth: 960, margin: "0 auto", padding: "24px 16px" }}>

        {/* Stats */}

            { icon: "💰", val: fmt(totalBal), lbl: "In Circulation" },
            { icon: "📋", val: db.transactions.length, lbl: "All Transactions" },

              <div style={{ fontFamily: "'Baloo 2', cursive", fontSize: 26, fontWeight: 800, color: "#1e2a3a" }}>{s.val}</div>
              <div style={{ fontSize: 11, color: "#8a94a6", fontWeight: 700, marginTop: 2 }}>{s.lbl}</div>

        {/* Tabs */}

              <span style={{ fontSize: 18 }}>{t.icon}</span>{t.label}
            </button>
          ))}
        </div>

        {/* ── STUDENTS ── */}
        {tab === "students" && (
          <>
            <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 14, fontWeight: 700, color: "#8a94a6", marginBottom: 14, cursor: "pointer" }}>

                  <div style={{ width: 46, height: 46, borderRadius: 13, background: "linear-gradient(135deg, #3498db, #9b59b6)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, marginBottom: 10 }}>{s.emoji}</div>
                  <div style={{ fontWeight: 800, fontSize: 14, marginBottom: 3 }}>{s.name}{s.archived && <span style={{ background: "#fadbd8", color: "#e74c3c", fontSize: 10, fontWeight: 800, padding: "2px 7px", borderRadius: 20, marginLeft: 6 }}>Archived</span>}</div>
                  <div style={{ fontSize: 12, color: "#8a94a6", marginBottom: 8 }}>ID: {s.id}</div>
                  <div style={{ fontFamily: "'Baloo 2', cursive", fontSize: 22, fontWeight: 700, color: "#27ae60" }}>{fmt(s.balance)}</div>
                </div>

            </div>
          </>

        {/* ── TRANSACTIONS ── */}
        {tab === "transactions" && (
          <>
            <Card>
              <div style={{ fontFamily: "'Baloo 2', cursive", fontSize: 18, fontWeight: 700, marginBottom: 16 }}>💳 Add Transaction</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 8, marginBottom: 16 }}>
                {typeConfig.map(tc => (
                  <div key={tc.key} onClick={() => setTxType(tc.key)} style={{ padding: "10px 4px", border: `2px solid ${txType===tc.key?tc.color:"#e4e9f0"}`, borderRadius: 10, textAlign: "center", cursor: "pointer", background: txType===tc.key?tc.bg:"#fff", color: txType===tc.key?tc.color:"#8a94a6", fontWeight: 700, fontSize: 11, transition: "all .2s" }}>{tc.label}</div>
                ))}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: txType==="transfer"?"1fr 1fr 1fr":"1fr 1fr", gap: 14 }}>
                <Select label={txType==="transfer"?"From Student":"Student"} value={txSid} onChange={e=>setTxSid(e.target.value)}>
                  <option value="">-- Select --</option>
                  {active.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                </Select>
                {txType==="transfer" && (
                  <Select label="To Student" value={txToSid} onChange={e=>setTxToSid(e.target.value)}>
                    <option value="">-- Select --</option>
                    {active.filter(s=>s.id!==txSid).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                  </Select>
                )}
                <Input label="Amount ($)" type="number" min="0.01" step="0.01" placeholder="0.00" value={txAmt} onChange={e=>setTxAmt(e.target.value)} />
              </div>
              <Input label="Description / Note" placeholder="e.g. Weekly allowance..." value={txNote} onChange={e=>setTxNote(e.target.value)} />
              <Btn onClick={submitTx}>✓ Submit Transaction</Btn>
            </Card>
            <Card>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
                <div style={{ fontFamily: "'Baloo 2', cursive", fontSize: 18, fontWeight: 700 }}>📅 Weekly Pay Day</div>
                <button onClick={()=>setScheduleOpen(true)} style={{ padding:"7px 14px", background: scheduleEnabled ? "#d5f5e3" : "#f0f4f8", color: scheduleEnabled ? "#27ae60" : "#8a94a6", border: scheduleEnabled ? "2px solid #27ae60" : "2px solid #e4e9f0", borderRadius:10, fontFamily:"inherit", fontSize:12, fontWeight:800, cursor:"pointer" }}>
                  {scheduleEnabled ? "⏰ Schedule ON" : "⏰ Set Schedule"}
                </button>
              </div>
              <div style={{ fontSize: 13, color: "#8a94a6", marginBottom: 16 }}>Deposit the same amount to ALL active students at once.</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                <Input label="Amount per Student ($)" type="number" min="0.01" step="0.01" placeholder="e.g. 10.00" value={wkAmt} onChange={e=>setWkAmt(e.target.value)} />
                <Input label="Note" placeholder="Weekly Allowance" value={wkNote} onChange={e=>setWkNote(e.target.value)} />
              </div>
              <Btn onClick={doPayday} color="#f39c12">💵 Run Weekly Pay Day</Btn>

            {/* ── FEES CARD ── */}

              <div style={{ fontFamily: "'Baloo 2', cursive", fontSize: 18, fontWeight: 700, marginBottom: 8 }}>💸 Charge Fees</div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                <div style={{ marginBottom: 14 }}>
                  <div style={{ fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: "0.07em", color: "#8a94a6", marginBottom: 6 }}>Fee Type</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {["Rent", "Taxes", "Late Fee", "Other"].map(t => (
                      <button key={t} onClick={() => { setFeeType(t); if (t !== "Other") setFeeNote(t); else setFeeNote(""); }}
                        style={{ padding: "8px 14px", background: feeType === t ? "#e74c3c" : "#f0f4f8", color: feeType === t ? "#fff" : "#8a94a6", border: "none", borderRadius: 10, fontFamily: "inherit", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                        {t === "Rent" ? "🏠 Rent" : t === "Taxes" ? "🧾 Taxes" : t === "Late Fee" ? "⏰ Late Fee" : "✏️ Other"}
                      </button>
                    ))}
                  </div>
                </div>
                <Input label="Amount per Student ($)" type="number" min="0.01" step="0.01" placeholder="e.g. 5.00" value={feeAmt} onChange={e => setFeeAmt(e.target.value)} />
              </div>
              <Input label={feeType === "Other" ? "Fee Description (required)" : "Custom Note (optional)"} placeholder={feeType === "Other" ? "e.g. Library fine..." : `e.g. ${feeType} - March`} value={feeNote} onChange={e => setFeeNote(e.target.value)} />

                <div style={{ fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: "0.07em", color: "#8a94a6", marginBottom: 8 }}>Charge Who?</div>

                  {["all", "canafford", "pick"].map((opt, i) => {
                    const labels = ["👥 All Students", "✅ Can Afford Only", "🎯 Pick Students"];
                    return (
                      <button key={opt} onClick={() => { setFeeStudents(opt); setFeeSelected([]); }}
                        style={{ padding: "9px 18px", background: feeStudents === opt ? "#1e2a3a" : "#f0f4f8", color: feeStudents === opt ? "#fff" : "#8a94a6", border: "none", borderRadius: 10, fontFamily: "inherit", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                        {labels[i]}
                      </button>
                    );
                  })}
                </div>
                {feeStudents === "pick" && (
                  <div style={{ border: "2px solid #e4e9f0", borderRadius: 12, overflow: "hidden" }}>
                    <div style={{ padding: "8px 14px", background: "#f8fafc", borderBottom: "1px solid #e4e9f0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontSize: 12, fontWeight: 800, color: "#8a94a6" }}>{feeSelected.length} student{feeSelected.length !== 1 ? "s" : ""} selected</span>
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={() => setFeeSelected(active.map(s => s.id))} style={{ background: "none", border: "none", color: "#3498db", fontFamily: "inherit", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>Select All</button>
                        <button onClick={() => setFeeSelected([])} style={{ background: "none", border: "none", color: "#e74c3c", fontFamily: "inherit", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>Clear</button>
                      </div>
                    </div>
                    {active.map(s => (
                      <div key={s.id} onClick={() => setFeeSelected(prev => prev.includes(s.id) ? prev.filter(id => id !== s.id) : [...prev, s.id])}
                        style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", borderBottom: "1px solid #f0f4f8", cursor: "pointer", background: feeSelected.includes(s.id) ? "#eafaf1" : "#fff" }}>
                        <div style={{ width: 20, height: 20, borderRadius: 6, border: "2px solid " + (feeSelected.includes(s.id) ? "#27ae60" : "#e4e9f0"), background: feeSelected.includes(s.id) ? "#27ae60" : "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, color: "#fff", flexShrink: 0 }}>
                          {feeSelected.includes(s.id) ? "✓" : ""}
                        </div>
                        <span style={{ flex: 1, fontWeight: 700, fontSize: 14 }}>{s.name}</span>
                        <span style={{ fontFamily: "'Baloo 2', cursive", fontSize: 15, fontWeight: 800, color: "#27ae60" }}>{fmt(s.balance)}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <Btn onClick={doFee} color="#e74c3c">💸 Charge Fee</Btn>
            </Card>
          </>
        )}

        {/* ── STORE MANAGEMENT ── */}
        {tab === "store" && (
          <>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18, flexWrap: "wrap", gap: 10 }}>
              <div style={{ fontFamily: "'Baloo 2', cursive", fontSize: 22, fontWeight: 800, color: "#1e2a3a" }}>🏪 Store Inventory</div>
              <Btn onClick={openAddItem} style={{ padding: "10px 20px", fontSize: 14 }}>➕ Add New Item</Btn>
            </div>

            {/* Store stats */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 14, marginBottom: 20 }}>
              {[
                { icon: "📦", val: (db.storeItems||[]).length, lbl: "Total Items" },
                { icon: "💸", val: fmt(db.transactions.filter(t=>t.type==="purchase").reduce((a,t)=>a+t.amount,0)), lbl: "Total Revenue" },
                { icon: "🛒", val: db.transactions.filter(t=>t.type==="purchase").length, lbl: "Orders Placed" },
              ].map(s => (
                <Card key={s.lbl} style={{ textAlign: "center", padding: "16px 12px", marginBottom: 0 }}>
                  <div style={{ fontSize: 24, marginBottom: 4 }}>{s.icon}</div>
                  <div style={{ fontFamily: "'Baloo 2', cursive", fontSize: 22, fontWeight: 800, color: "#1e2a3a" }}>{s.val}</div>
                  <div style={{ fontSize: 11, color: "#8a94a6", fontWeight: 700 }}>{s.lbl}</div>
                </Card>
              ))}
            </div>

            {/* Item list */}
            {(db.storeItems||[]).length === 0
              ? <Card><div style={{ textAlign: "center", padding: 32, color: "#8a94a6" }}><div style={{ fontSize: 40, marginBottom: 10 }}>🏪</div><div style={{ fontWeight: 600 }}>No items yet. Add your first item!</div></div></Card>
              : (db.storeItems||[]).map(item => {
                  const sold = db.transactions.filter(t=>t.type==="purchase"&&t.itemId===item.id).reduce((a,t)=>a+t.amount,0);
                  const orders = db.transactions.filter(t=>t.type==="purchase"&&t.itemId===item.id).length;
                  const lowStock = item.stock !== 999 && item.stock <= 3;
                  return (
                    <Card key={item.id} style={{ marginBottom: 12, padding: 18 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
                        <div style={{ width:56, height:56, borderRadius:14, overflow:"hidden", flexShrink:0, background:"#f8fafc", display:"flex", alignItems:"center", justifyContent:"center", border:"2px solid #f0f4f8" }}>
                          {item.image
                            ? <img src={item.image} alt={item.name} style={{ width:"100%",height:"100%",objectFit:"cover" }} />
                            : <span style={{ fontSize:36 }}>{item.emoji}</span>
                          }
                        </div>
                        <div style={{ flex: 1, minWidth: 140 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                            <span style={{ fontWeight: 800, fontSize: 16 }}>{item.name}</span>
                            <span style={{ background: item.category==="Privilege"?"#e8daef":"#d6eaf8", color: item.category==="Privilege"?"#7d3c98":"#1a5276", fontSize: 10, fontWeight: 800, padding: "2px 8px", borderRadius: 20, textTransform: "uppercase" }}>{item.category}</span>
                            {lowStock && <span style={{ background: "#fadbd8", color: "#e74c3c", fontSize: 10, fontWeight: 800, padding: "2px 8px", borderRadius: 20 }}>⚠️ Low Stock</span>}
                          </div>
                          <div style={{ fontSize: 12, color: "#8a94a6", marginBottom: 6 }}>{item.description}</div>
                          <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                            <span style={{ fontFamily: "'Baloo 2',cursive", fontSize: 18, fontWeight: 800, color: "#27ae60" }}>{fmt(item.price)}</span>
                            <span style={{ fontSize: 13, color: lowStock?"#e74c3c":"#8a94a6", fontWeight: 700 }}>Stock: {item.stock===999?"Unlimited":item.stock}</span>
                            <span style={{ fontSize: 13, color: "#8a94a6", fontWeight: 700 }}>Sold: {orders} orders · {fmt(sold)}</span>
                          </div>
                        </div>
                        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                          {item.stock !== 999 && (
                            <button onClick={() => restockItem(item.id, 5)} style={{ padding: "7px 12px", background: "#d5f5e3", color: "#27ae60", border: "none", borderRadius: 8, fontFamily: "inherit", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>+5 Stock</button>
                          )}
                          <button onClick={() => openEditItem(item)} style={{ padding: "7px 12px", background: "#d6eaf8", color: "#1a5276", border: "none", borderRadius: 8, fontFamily: "inherit", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>✏️ Edit</button>
                          <button onClick={() => setConfirm({ title: "Remove Item?", msg: `Remove "${item.name}" from the store?`, cb: async () => deleteItem(item.id) })} style={{ padding: "7px 12px", background: "#fadbd8", color: "#e74c3c", border: "none", borderRadius: 8, fontFamily: "inherit", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>🗑️</button>
                        </div>
                      </div>
                    </Card>
                  );
                })
            }
          </>
        )}

        {/* ── REPORTS ── */}
        {tab === "records" && (
          <>
            <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
              {[{ key: "transactions", label: "📋 Transaction Log" }, { key: "summary", label: "👤 Student Report Cards" }, { key: "store", label: "🏪 Store Report" }].map(r => (
                <button key={r.key} onClick={() => setReportView(r.key)} style={{ padding: "10px 16px", background: reportView===r.key?"#1e2a3a":"#fff", color: reportView===r.key?"#fff":"#8a94a6", border: "2px solid "+(reportView===r.key?"#1e2a3a":"#e4e9f0"), borderRadius: 10, fontFamily: "inherit", fontSize: 12, fontWeight: 700, cursor: "pointer", transition: "all .2s" }}>{r.label}</button>
              ))}
            </div>

            {/* Transaction Log */}
            {reportView==="transactions" && (
              <Card>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10, marginBottom: 16 }}>
                  <div style={{ fontFamily: "'Baloo 2', cursive", fontSize: 18, fontWeight: 700 }}>📋 Transaction Log</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <Btn onClick={exportCSV} color="#27ae60" style={{ padding: "9px 16px", fontSize: 13 }}>⬇️ CSV</Btn>
                    <Btn onClick={printReport} color="#3498db" style={{ padding: "9px 16px", fontSize: 13 }}>🖨️ Print</Btn>
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(130px,1fr))", gap: 10, marginBottom: 16 }}>
                  <select value={fSid} onChange={e=>setFSid(e.target.value)} style={{ padding: "9px 12px", border: "2px solid #e4e9f0", borderRadius: 10, fontFamily: "inherit", fontSize: 13, fontWeight: 600, background: "#fff" }}>
                    <option value="">All Students</option>{db.students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                  <select value={fType} onChange={e=>setFType(e.target.value)} style={{ padding: "9px 12px", border: "2px solid #e4e9f0", borderRadius: 10, fontFamily: "inherit", fontSize: 13, fontWeight: 600, background: "#fff" }}>
                    <option value="">All Types</option>
                    {["deposit","withdraw","bonus","penalty","transfer","purchase"].map(t=><option key={t} value={t}>{t}</option>)}
                  </select>
                  <input type="date" value={fFrom} onChange={e=>setFFrom(e.target.value)} style={{ padding: "9px 12px", border: "2px solid #e4e9f0", borderRadius: 10, fontFamily: "inherit", fontSize: 13, fontWeight: 600 }} />
                  <input type="date" value={fTo} onChange={e=>setFTo(e.target.value)} style={{ padding: "9px 12px", border: "2px solid #e4e9f0", borderRadius: 10, fontFamily: "inherit", fontSize: 13, fontWeight: 600 }} />
                </div>
                {/* Sort bar */}
                <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:14, alignItems:"center" }}>
                  <span style={{ fontSize:11, fontWeight:800, color:"#8a94a6", textTransform:"uppercase", letterSpacing:"0.07em" }}>Sort:</span>
                  {[
                    {val:"date_desc", label:"📅 Newest"},
                    {val:"date_asc", label:"📅 Oldest"},
                    {val:"name_asc", label:"🔤 A→Z"},
                    {val:"name_desc", label:"🔤 Z→A"},
                    {val:"amount_desc", label:"💰 Highest"},
                    {val:"amount_asc", label:"💰 Lowest"},
                    {val:"type_asc", label:"🏷️ Type"},
                  ].map(s => (
                    <button key={s.val} onClick={()=>setTxSort(s.val)} style={{ padding:"6px 12px", background: txSort===s.val?"#1e2a3a":"#f0f4f8", color: txSort===s.val?"#fff":"#8a94a6", border:"none", borderRadius:8, fontFamily:"inherit", fontSize:12, fontWeight:700, cursor:"pointer" }}>{s.label}</button>
                  ))}
                </div>

                {filteredTx.length > 0 && (() => {
                  const totalIn = filteredTx.filter(t=>t.type==="deposit"||t.type==="bonus").reduce((a,t)=>a+t.amount,0);
                  const totalOut = filteredTx.filter(t=>t.type==="withdraw"||t.type==="penalty"||t.type==="purchase").reduce((a,t)=>a+t.amount,0);
                  const storeSales = filteredTx.filter(t=>t.type==="purchase").reduce((a,t)=>a+t.amount,0);
                  return (
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 16 }}>
                      {[{label:"Transactions",val:filteredTx.length,color:"#1e2a3a",icon:"📋"},{label:"Credited",val:fmt(totalIn),color:"#27ae60",icon:"💚"},{label:"Debited",val:fmt(totalOut),color:"#e74c3c",icon:"🔴"},{label:"Store Sales",val:fmt(storeSales),color:"#f39c12",icon:"🛍️"}].map(s=>(
                        <div key={s.label} style={{ background: "#f8fafc", borderRadius: 12, padding: "12px 10px", textAlign: "center" }}>
                          <div style={{ fontSize: 18, marginBottom: 4 }}>{s.icon}</div>
                          <div style={{ fontFamily:"'Baloo 2',cursive", fontSize: 16, fontWeight: 800, color: s.color }}>{s.val}</div>
                          <div style={{ fontSize: 10, color: "#8a94a6", fontWeight: 700 }}>{s.label}</div>
                        </div>
                      ))}
                    </div>
                  );
                })()}
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                    <thead><tr>{["Date","Student","Type","Description","Amount"].map(h=><th key={h} style={{ textAlign:"left",padding:"10px 12px",fontSize:11,textTransform:"uppercase",letterSpacing:"0.06em",color:"#8a94a6",borderBottom:"2px solid #f0f4f8",fontWeight:800 }}>{h}</th>)}</tr></thead>
                    <tbody>
                      {filteredTx.length===0
                        ? <tr><td colSpan={5} style={{ textAlign:"center",padding:28,color:"#8a94a6" }}>No records found.</td></tr>
                        : filteredTx.map(t=>{
                            const st=db.students.find(s=>s.id===t.studentId);
                            const toSt=t.toStudentId?db.students.find(s=>s.id===t.toStudentId):null;
                            const isDebit=t.type==="withdraw"||t.type==="penalty"||t.type==="purchase";
                            return(
                              <tr key={t.id} style={{ borderBottom:"1px solid #f0f4f8" }}>
                                <td style={{ padding:"11px 12px",fontWeight:600 }}>{dateStr(t.date)}</td>
                                <td style={{ padding:"11px 12px",fontWeight:600 }}>{toSt?`${st?.name} → ${toSt.name}`:st?.name}</td>

                    w.document.write(`<html><head><title>Student Report Cards</title><style>body{font-family:sans-serif;padding:32px}table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;padding:8px 12px;background:#f0f4f8;font-size:11px;text-transform:uppercase;color:#8a94a6}td{padding:10px 12px;border-bottom:1px solid #f0f4f8}@media print{button{display:none}}</style></head><body><h1>🏦 Connecting America — Student Report Cards</h1><p>Generated: ${new Date().toLocaleString()}</p><button onclick="window.print()" style="margin-bottom:20px;padding:10px 20px;background:#1e2a3a;color:#fff;border:none;border-radius:8px;cursor:pointer">🖨️ Print</button><table><thead><tr><th>Student</th><th>ID</th><th>Balance</th><th>Total Earned</th><th>Total Spent</th><th>Store Spent</th><th>Transactions</th></tr></thead><tbody>${rows}</tbody></table></body></html>`);

                    {val:"name_asc", label:"🔤 A→Z"},
                    {val:"name_desc", label:"🔤 Z→A"},

                    {val:"balance_asc", label:"💰 Balance ↑"},
                    {val:"earned_desc", label:"💚 Earned ↓"},

                  ))}
                </div>

                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px,1fr))", gap: 16 }}>
                  {[...studentSummaries].sort((a,b) => {
                    if (cardSort==="name_asc") return a.name.localeCompare(b.name);
                    if (cardSort==="name_desc") return b.name.localeCompare(a.name);
                    if (cardSort==="balance_desc") return b.balance - a.balance;
                    if (cardSort==="balance_asc") return a.balance - b.balance;
                    if (cardSort==="earned_desc") return b.totalIn - a.totalIn;
                    if (cardSort==="spent_desc") return b.totalOut - a.totalOut;
                    if (cardSort==="tx_desc") return b.txCount - a.txCount;
                    return 0;
                  }).map(s => {
                    const sTx = db.transactions.filter(t=>t.studentId===s.id||t.toStudentId===s.id).slice().reverse().slice(0,5);
                    return (
                      <Card key={s.id} style={{ marginBottom: 0 }}>
                        <div style={{ display:"flex",alignItems:"center",gap:12,marginBottom:16,paddingBottom:14,borderBottom:"2px solid #f0f4f8" }}>
                          <div style={{ width:44,height:44,borderRadius:12,background:"linear-gradient(135deg,#3498db,#9b59b6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0 }}>{s.emoji}</div>
                          <div><div style={{ fontWeight:800,fontSize:15 }}>{s.name}</div><div style={{ fontSize:12,color:"#8a94a6" }}>ID: {s.id}</div></div>
                          <div style={{ marginLeft:"auto",textAlign:"right" }}>
                            <div style={{ fontFamily:"'Baloo 2',cursive",fontSize:22,fontWeight:800,color:"#27ae60" }}>{fmt(s.balance)}</div>
                            <div style={{ fontSize:11,color:"#8a94a6" }}>Balance</div>
                          </div>
                        </div>
                        <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:16 }}>

                              <div style={{ fontSize:10,color:"#8a94a6",fontWeight:700 }}>{st.label}</div>

                          : sTx.map(t=>{
                              const isTo=t.toStudentId===s.id;
                              const isDebit=(t.type==="withdraw"||t.type==="penalty"||t.type==="purchase")||(t.type==="transfer"&&!isTo);
                              const icons={deposit:"💰",withdraw:"🛍️",bonus:"⭐",penalty:"⚠️",purchase:"🛒",transfer:isTo?"📥":"📤"};
                              return(
                                <div key={t.id} style={{ display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid #f8fafc" }}>
                                  <span style={{ fontSize:14 }}>{icons[t.type]}</span>
                                  <span style={{ flex:1,fontSize:12,fontWeight:600,color:"#1e2a3a" }}>{t.note||t.type}</span>
                                  <span style={{ fontSize:12,fontWeight:800,color:isDebit?"#e74c3c":"#27ae60" }}>{(isDebit?"-":"+")+fmt(t.amount)}</span>
                                </div>

                            })

                      </Card>
                    );
                  })}
                </div>
              </>
            )}

            {/* Store Report */}
            {reportView==="store" && (
              <Card>
                <div style={{ fontFamily:"'Baloo 2',cursive",fontSize:18,fontWeight:700,marginBottom:16 }}>🏪 Store Sales Report</div>
                {/* Sort bar */}
                <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:14, alignItems:"center" }}>
                  <span style={{ fontSize:11, fontWeight:800, color:"#8a94a6", textTransform:"uppercase", letterSpacing:"0.07em" }}>Sort:</span>
                  {[
                    {val:"name_asc", label:"🔤 A→Z"},
                    {val:"name_desc", label:"🔤 Z→A"},
                    {val:"price_desc", label:"💰 Price ↓"},
                    {val:"price_asc", label:"💰 Price ↑"},
                    {val:"revenue_desc", label:"💸 Revenue ↓"},
                    {val:"orders_desc", label:"🛒 Orders ↓"},
                    {val:"stock_asc", label:"📦 Stock ↑"},
                  ].map(s => (
                    <button key={s.val} onClick={()=>setStoreSort(s.val)} style={{ padding:"6px 12px", background: storeSort===s.val?"#1e2a3a":"#f0f4f8", color: storeSort===s.val?"#fff":"#8a94a6", border:"none", borderRadius:8, fontFamily:"inherit", fontSize:12, fontWeight:700, cursor:"pointer" }}>{s.label}</button>
                  ))}
                </div>
                <div style={{ overflowX:"auto" }}>
                  <table style={{ width:"100%",borderCollapse:"collapse",fontSize:13 }}>

                    <tbody>
                      {(db.storeItems||[]).length===0
                        ? <tr><td colSpan={6} style={{ textAlign:"center",padding:28,color:"#8a94a6" }}>No store items yet.</td></tr>

                            const aOrders=db.transactions.filter(t=>t.type==="purchase"&&t.itemId===a.id).length;
                            const bOrders=db.transactions.filter(t=>t.type==="purchase"&&t.itemId===b.id).length;
                            const aRev=db.transactions.filter(t=>t.type==="purchase"&&t.itemId===a.id).reduce((s,t)=>s+t.amount,0);
                            const bRev=db.transactions.filter(t=>t.type==="purchase"&&t.itemId===b.id).reduce((s,t)=>s+t.amount,0);
                            if (storeSort==="name_asc") return a.name.localeCompare(b.name);
                            if (storeSort==="name_desc") return b.name.localeCompare(a.name);
                            if (storeSort==="price_desc") return b.price - a.price;
                            if (storeSort==="price_asc") return a.price - b.price;
                            if (storeSort==="revenue_desc") return bRev - aRev;
                            if (storeSort==="orders_desc") return bOrders - aOrders;
                            if (storeSort==="stock_asc") return (a.stock===999?99999:a.stock) - (b.stock===999?99999:b.stock);
                            return 0;

                              <tr key={item.id} style={{ borderBottom:"1px solid #f0f4f8" }}>
                                <td style={{ padding:"11px 12px",fontWeight:700 }}>
                                  <div style={{ display:"flex",alignItems:"center",gap:8 }}>
                                    <div style={{ width:30,height:30,borderRadius:7,overflow:"hidden",flexShrink:0,background:"#f8fafc",display:"flex",alignItems:"center",justifyContent:"center" }}>
                                      {item.image ? <img src={item.image} alt={item.name} style={{ width:"100%",height:"100%",objectFit:"cover" }} /> : <span style={{ fontSize:16 }}>{item.emoji}</span>}
                                    </div>
                                    {item.name}
                                  </div>
                                </td>
                                <td style={{ padding:"11px 12px" }}><span style={{ background:item.category==="Privilege"?"#e8daef":"#d6eaf8",color:item.category==="Privilege"?"#7d3c98":"#1a5276",fontSize:10,fontWeight:800,padding:"2px 8px",borderRadius:20,textTransform:"uppercase" }}>{item.category}</span></td>

                              </tr>
                            );
                          })
                      }
                    </tbody>
                  </table>
                </div>
              </Card>

          </>

            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:24, flexWrap:"wrap", gap:10 }}>

                <div style={{ fontFamily:"'Baloo 2',cursive", fontSize:28, fontWeight:800, color:"#1e2a3a", marginBottom:4 }}>🏆 Disruption Tally Tracker</div>

            </div>

            {/* Winner Banner */}
            {(() => {
              const totals = tallyClasses.map(c => ({ ...c, total: getTotalTallies(c) }));
              const minTotal = Math.min(...totals.map(c => c.total));
              const leaders = totals.filter(c => c.total === minTotal);
              if (leaders.length === tallyClasses.length && minTotal === 0) return null;
              return (
                <div style={{ background: "linear-gradient(135deg, #f39c12, #e67e22)", borderRadius:18, padding:"16px 24px", marginBottom:20, color:"#fff", textAlign:"center", boxShadow:"0 6px 24px rgba(243,156,18,0.35)" }}>
                  <div style={{ fontSize:28, marginBottom:4 }}>🥇</div>
                  <div style={{ fontFamily:"'Baloo 2',cursive", fontSize:20, fontWeight:800 }}>
                    {leaders.length === 1 ? `${leaders[0].name} is Winning!` : "It's a Tie!"}

                  <div style={{ fontSize:13, opacity:0.9, marginTop:4 }}>
                    {leaders.length === 1 ? `${minTotal} total talli${minTotal !== 1 ? "es" : ""} — keep it up! 🎉` : `Both classes tied at ${minTotal} tallies`}
                  </div>
                </div>
              );
            })()}

            {/* Class Cards */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(280px,1fr))", gap:20, marginBottom:24 }}>
              {tallyClasses.map(c => {
                const total = getTotalTallies(c);
                const weekTotal = getWeekTallies(c);
                const maxTallies = Math.max(...tallyClasses.map(getTotalTallies), 1);
                const pct = Math.round((total / maxTallies) * 100);
                return (
                  <div key={c.id} style={{ background:"#fff", borderRadius:20, padding:24, boxShadow:"0 4px 24px rgba(0,0,0,0.08)", border:`3px solid ${c.color}20` }}>
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
                      <div>
                        <div style={{ fontFamily:"'Baloo 2',cursive", fontSize:22, fontWeight:800, color:"#1e2a3a" }}>{c.name}</div>
                        <div style={{ fontSize:12, color:"#8a94a6", fontWeight:600 }}>🎁 Prize: {c.prize || "TBD"}</div>
                      </div>
                      <div style={{ display:"flex", gap:6 }}>
                        <button onClick={() => { setTallyEditClass(c.id); setTallyEditName(c.name); setTallyEditPrize(c.prize); setTallyEditColor(c.color); setTallyEditOpen(true); }}
                          style={{ background:"#f0f4f8", border:"none", borderRadius:8, padding:"6px 10px", cursor:"pointer", fontSize:12, fontWeight:700, color:"#8a94a6", fontFamily:"inherit" }}>✏️ Edit</button>
                        <button onClick={() => deleteTallyClass(c.id)}
                          style={{ background:"#fadbd8", border:"none", borderRadius:8, padding:"6px 10px", cursor:"pointer", fontSize:12, fontWeight:700, color:"#e74c3c", fontFamily:"inherit" }}>🗑️</button>
                      </div>
                    </div>

                    {/* Big tally count */}
                    <div style={{ textAlign:"center", marginBottom:16 }}>
                      <div style={{ fontFamily:"'Baloo 2',cursive", fontSize:72, fontWeight:800, color:c.color, lineHeight:1 }}>{total}</div>
                      <div style={{ fontSize:13, color:"#8a94a6", fontWeight:700 }}>Total Tallies</div>
                      <div style={{ fontSize:12, color:"#8a94a6", marginTop:4 }}>This week: <strong style={{ color:c.color }}>{weekTotal}</strong></div>
                    </div>

                    {/* Progress bar — lower is better */}
                    <div style={{ marginBottom:16 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#8a94a6", fontWeight:700, marginBottom:4 }}>
                        <span>Disruption Level</span>
                        <span>{pct}%</span>
                      </div>
                      <div style={{ height:10, background:"#f0f4f8", borderRadius:10, overflow:"hidden" }}>
                        <div style={{ height:"100%", width:`${pct}%`, background:`linear-gradient(90deg, ${c.color}, ${c.color}99)`, borderRadius:10, transition:"width .4s" }} />

                        : Array.from({ length: total }).map((_, i) => (
                            <span key={i} style={{ fontSize:18, lineHeight:1 }}>{(i + 1) % 5 === 0 ? "𝍸 " : "𝍷"}</span>

                    </div>

                    {/* Controls */}
                    <div style={{ display:"flex", gap:8, marginBottom:8 }}>
                      <button onClick={() => addTally(c.id)} style={{ flex:2, padding:"12px", background:c.color, color:"#fff", border:"none", borderRadius:12, fontFamily:"inherit", fontSize:16, fontWeight:800, cursor:"pointer" }}>+ Add Tally</button>
                      <button onClick={() => removeTally(c.id)} disabled={total===0} style={{ flex:1, padding:"12px", background:"#f0f4f8", color:"#8a94a6", border:"none", borderRadius:12, fontFamily:"inherit", fontSize:13, fontWeight:800, cursor:total===0?"not-allowed":"pointer", opacity:total===0?0.5:1 }}>↩ Undo</button>
                      <button onClick={() => setConfirm({ title:`Reset ${c.name}?`, msg:"This will clear all tallies for this class.", cb: async () => resetTallies(c.id) })} style={{ flex:1, padding:"12px", background:"#fadbd8", color:"#e74c3c", border:"none", borderRadius:12, fontFamily:"inherit", fontSize:13, fontWeight:800, cursor:"pointer" }}>🗑️</button>
                    </div>
                    <button onClick={() => { setTallyPastClass(c.id); setTallyPastDate(new Date().toISOString().slice(0,10)); setTallyPastCount("1"); setTallyPastOpen(true); }}
                      style={{ width:"100%", padding:"10px", background:"#f0f4f8", color:"#8a94a6", border:"2px dashed #e4e9f0", borderRadius:12, fontFamily:"inherit", fontSize:13, fontWeight:700, cursor:"pointer" }}>
                      📅 Add Tallies for a Past Date
                    </button>
                  </div>
                );
              })}

            {/* Full Tally Log */}

              <div style={{ fontFamily:"'Baloo 2',cursive", fontSize:18, fontWeight:700, marginBottom:14 }}>📅 Full Tally Log</div>

                  <div style={{ overflowX:"auto" }}>

                      <thead>
                        <tr>

                            </td>
                          </tr>

                      </tbody>
                    </table>
                  </div>
                );
              })()}
            </Card>
          </>
        )}

        {/* ── MANAGE ── */}
        {tab === "manage" && (
          <>
            {/* ── IMPORT FROM EXCEL ── */}
